name: freshgo_app
description: "FreshGo - Groceries, Food, Gas & Water delivery in Kampala"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  geolocator: ^14.0.2
  supabase_flutter: ^2.12.4
  connectivity_plus: ^7.1.1
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/products/
    - assets/images/banners/
    - assets/images/icons/
